# Project root Taskfile. Routes top-level commands to the per-OS Taskfiles
# under build/ which were generated by `wails3 generate build-assets` and
# patched to use bun instead of npm. iOS / Android subtrees are intentionally
# omitted because this is a desktop-only application.
#
# Usage:
#   wails3 dev                    — run the app in dev mode (Vite + Go) with hot reload
#   wails3 task build             — build the app for the current OS
#   wails3 task package           — build + package (.app on macOS, .deb/.rpm on Linux, NSIS on Windows)
#   wails3 task run               — build and launch the app

version: '3'

includes:
  common:  ./build/Taskfile.yml
  darwin:  ./build/darwin/Taskfile.yml
  linux:   ./build/linux/Taskfile.yml
  windows: ./build/windows/Taskfile.yml

vars:
  APP_NAME: "burp-upstream-adapter"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application for the current OS
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build for the current OS
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Builds and runs the application for the current OS
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode (alias for `wails3 dev`)
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  bindings:
    summary: Regenerate the TypeScript frontend bindings
    cmds:
      - wails3 generate bindings -ts -d frontend/bindings -clean=true

  test:
    summary: Run all internal Go tests
    cmds:
      - go test ./internal/... -count=1 -timeout 120s

  vet:
    summary: Run go vet across the module
    cmds:
      - go vet ./...
