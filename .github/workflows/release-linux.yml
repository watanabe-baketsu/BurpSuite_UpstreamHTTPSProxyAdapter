# ════════════════════════════════════════════════════════════════
# Linux Build (Wails v3 + bun + Task)
# ════════════════════════════════════════════════════════════════
# Reusable workflow called from release.yml.
# Uses `wails3 task linux:build` to compile the binary, then packages
# it as a tar.gz for distribution. AppImage / deb / rpm packaging is
# available via `wails3 task linux:package` if the release scope is
# expanded later.
# ════════════════════════════════════════════════════════════════

name: "Build Linux"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      go-version:
        required: false
        type: string
        default: "1.25"
      wails-version:
        required: false
        type: string
        default: "v3.0.0-alpha.78"
      app-name:
        required: false
        type: string
        default: "burp-upstream-adapter"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ inputs.wails-version }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests
        run: go test ./internal/... -v -count=1 -timeout 120s

      - name: Build (wails3 task linux:build)
        run: wails3 task linux:build

      - name: Package
        run: |
          ARTIFACT="${{ inputs.app-name }}-linux-amd64"
          cd bin
          tar czf "../${ARTIFACT}.tar.gz" "${{ inputs.app-name }}"
          cd ..
          echo "ARTIFACT_NAME=${ARTIFACT}" >> "${GITHUB_ENV}"
          echo "ASSET_PATH=${ARTIFACT}.tar.gz" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 3
