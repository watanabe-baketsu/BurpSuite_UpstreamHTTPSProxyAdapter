# ════════════════════════════════════════════════════════════════
# Windows Build (Wails v3 + bun + Task)
# ════════════════════════════════════════════════════════════════
# Uses `wails3 task windows:build` to compile the .exe, then zips it
# for distribution. NSIS / MSIX packaging is available via
# `wails3 task windows:package` if needed later.
# ════════════════════════════════════════════════════════════════

name: "Build Windows"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      go-version:
        required: false
        type: string
        default: "1.25"
      wails-version:
        required: false
        type: string
        default: "v3.0.0-alpha.78"
      app-name:
        required: false
        type: string
        default: "burp-upstream-adapter"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails3 CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ inputs.wails-version }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests
        shell: bash
        run: go test ./internal/... -v -count=1 -timeout 120s

      - name: Build (wails3 task windows:build)
        shell: bash
        run: wails3 task windows:build

      - name: Package
        shell: pwsh
        run: |
          $artifact = "${{ inputs.app-name }}-windows-amd64"
          Compress-Archive `
            -Path "bin\${{ inputs.app-name }}.exe" `
            -DestinationPath "${artifact}.zip"
          echo "ARTIFACT_NAME=${artifact}" >> $env:GITHUB_ENV
          echo "ASSET_PATH=${artifact}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 3
