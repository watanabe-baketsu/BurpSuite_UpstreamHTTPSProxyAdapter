name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for the same PR/branch when a new push arrives.
# Pushes to main are never cancelled (each main commit should be tested).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  WAILS_VERSION: "v3.0.0-alpha.78"

jobs:
  # ──────────────────────────────────────
  # Go: lint, vet, test
  # ──────────────────────────────────────
  go-test:
    name: "Go tests (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        shell: bash
        run: go vet ./internal/...

      - name: Go test
        shell: bash
        run: go test ./internal/... -v -count=1 -timeout 120s -race

  # ──────────────────────────────────────
  # Frontend: bindings + typecheck + Vite build
  # ──────────────────────────────────────
  frontend:
    name: "Frontend build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The wails3 CLI transitively imports v3/internal/operatingsystem which
      # cgo-links to gtk+-3.0 / webkit2gtk on Linux, so `go install` fails
      # without the dev headers in PKG_CONFIG_PATH. Match wails-build below.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Generate frontend bindings
        run: wails3 generate bindings -ts -d frontend/bindings -clean=true

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        working-directory: frontend
        run: bun x tsc --noEmit

      - name: Vite build
        working-directory: frontend
        run: bun run build

  # ──────────────────────────────────────
  # Wails: full Linux build smoke-test (wails3 task linux:build)
  # ──────────────────────────────────────
  wails-build:
    name: "Wails build (Linux)"
    runs-on: ubuntu-22.04
    needs: [go-test, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (wails3 task linux:build)
        run: wails3 task linux:build
