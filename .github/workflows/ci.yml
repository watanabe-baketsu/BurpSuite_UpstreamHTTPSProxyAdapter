name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for the same PR/branch when a new push arrives.
# Pushes to main are never cancelled (each main commit should be tested).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────
  # Go: lint, vet, test
  # ──────────────────────────────────────
  go-test:
    name: "Go tests (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        shell: bash
        run: go vet ./internal/...

      - name: Go test
        shell: bash
        run: go test ./internal/... -v -count=1 -timeout 120s -race

  # ──────────────────────────────────────
  # Frontend: typecheck, build
  # ──────────────────────────────────────
  frontend:
    name: "Frontend build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

  # ──────────────────────────────────────
  # Wails: full build smoke test (Linux)
  # ──────────────────────────────────────
  wails-build:
    name: "Wails build (Linux)"
    runs-on: ubuntu-22.04
    # Only run full build on main push or when workflow files change.
    # PRs get Go test + frontend build which is faster feedback.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'full-build')
    needs: [go-test, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Wails build
        run: wails build -platform linux/amd64
