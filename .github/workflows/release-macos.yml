# ════════════════════════════════════════════════════════════════
# macOS Build — Code-sign, Notarize, Staple (Wails v3 + bun + Task)
# ════════════════════════════════════════════════════════════════
# Reusable workflow called from release.yml.
#
# Build pipeline:
#   1. `wails3 task darwin:package` builds the .app bundle (ad-hoc signed)
#   2. We re-sign with Developer ID (overwriting the ad-hoc signature),
#      then notarize via notarytool and staple the ticket.
#
# Required secrets (passed from caller):
#   BUILD_CERTIFICATE_BASE64      - base64-encoded .p12 file
#   P12_PASSWORD                  - password for the .p12
#   KEYCHAIN_PASSWORD             - arbitrary password for temp keychain
#   APPLE_ID                      - Apple ID email (notarization)
#   APPLE_TEAM_ID                 - 10-char Apple Team ID
#   APPLE_APP_SPECIFIC_PASSWORD   - app-specific password for notarytool
# ════════════════════════════════════════════════════════════════

name: "Build macOS (sign + notarize)"

on:
  workflow_call:
    inputs:
      version:
        description: "Semantic version tag (e.g. v1.0.0)"
        required: true
        type: string
      go-version:
        required: false
        type: string
        default: "1.25"
      wails-version:
        required: false
        type: string
        default: "v3.0.0-alpha.78"
      app-name:
        required: false
        type: string
        default: "burp-upstream-adapter"
    secrets:
      BUILD_CERTIFICATE_BASE64:
        required: true
      P12_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      APPLE_ID:
        required: true
      APPLE_TEAM_ID:
        required: true
      APPLE_APP_SPECIFIC_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  build-sign-notarize:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APP_BUNDLE: "bin/${{ inputs.app-name }}.app"
      ENTITLEMENTS: "build/darwin/entitlements.plist"
      KEYCHAIN_PROFILE: "notarytool-profile"

    steps:
      - name: Set KEYCHAIN_PATH
        run: echo "KEYCHAIN_PATH=${RUNNER_TEMP}/app-signing.keychain-db" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ inputs.wails-version }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests
        run: go test ./internal/... -v -count=1 -timeout 120s

      # ════════════════════════════════════════════════
      # Import Developer ID certificate into temp keychain
      # ════════════════════════════════════════════════
      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"
          echo -n "${BUILD_CERTIFICATE_BASE64}" | base64 --decode -o "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -P "${P12_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          SIGNING_IDENTITY=$(
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" \
              | awk -F'"' '/Developer ID Application/{print $2; exit}'
          )
          if [ -z "${SIGNING_IDENTITY}" ]; then
            echo "::error::Developer ID Application certificate not found in keychain"
            exit 1
          fi
          echo "Found identity: ${SIGNING_IDENTITY}"
          echo "SIGNING_IDENTITY=${SIGNING_IDENTITY}" >> "${GITHUB_ENV}"

      # ════════════════════════════════════════════════
      # Build .app bundle via wails3 task (ad-hoc signed)
      # ════════════════════════════════════════════════
      - name: Build .app bundle (wails3 task darwin:package)
        env:
          GOARCH: arm64
        run: wails3 task darwin:package

      # ════════════════════════════════════════════════
      # Re-sign with Developer ID (replaces ad-hoc)
      # ════════════════════════════════════════════════
      - name: Codesign the app bundle (Developer ID, replaces ad-hoc)
        run: |
          set -euo pipefail
          echo "── Signing inner binary ──"
          codesign --force \
            --options runtime \
            --sign "${SIGNING_IDENTITY}" \
            --timestamp \
            --entitlements "${ENTITLEMENTS}" \
            "${APP_BUNDLE}/Contents/MacOS/${{ inputs.app-name }}"
          echo "── Signing .app bundle ──"
          codesign --force \
            --options runtime \
            --sign "${SIGNING_IDENTITY}" \
            --timestamp \
            --entitlements "${ENTITLEMENTS}" \
            "${APP_BUNDLE}"

      - name: Verify codesign
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "${APP_BUNDLE}"
          spctl --assess --type execute --verbose=2 "${APP_BUNDLE}" || true

      # ════════════════════════════════════════════════
      # Notarization
      # ════════════════════════════════════════════════
      - name: Create zip for notarization
        run: |
          ditto -c -k --keepParent \
            "${APP_BUNDLE}" \
            "${RUNNER_TEMP}/notarization.zip"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "${KEYCHAIN_PROFILE}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}"

      - name: Submit for notarization
        timeout-minutes: 30
        run: |
          set -euo pipefail
          SUBMIT_OUTPUT=$(
            xcrun notarytool submit "${RUNNER_TEMP}/notarization.zip" \
              --keychain-profile "${KEYCHAIN_PROFILE}" \
              --wait 2>&1
          )
          echo "${SUBMIT_OUTPUT}"
          SUBMISSION_ID=$(echo "${SUBMIT_OUTPUT}" | awk '/id:/{print $2; exit}')
          if echo "${SUBMIT_OUTPUT}" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed — fetching detailed log"
            xcrun notarytool log "${SUBMISSION_ID}" \
              --keychain-profile "${KEYCHAIN_PROFILE}" || true
            exit 1
          fi

      - name: Staple notarization ticket
        run: xcrun stapler staple "${APP_BUNDLE}"

      - name: Validate staple
        run: xcrun stapler validate "${APP_BUNDLE}"

      - name: Create distribution zip
        run: |
          ARTIFACT_NAME="${{ inputs.app-name }}-darwin-arm64"
          ditto -c -k --keepParent \
            "${APP_BUNDLE}" \
            "${ARTIFACT_NAME}.zip"
          echo "ASSET_PATH=${ARTIFACT_NAME}.zip" >> "${GITHUB_ENV}"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 3

      - name: Cleanup keychain and certificate
        if: always()
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" 2>/dev/null || true
          rm -f "${RUNNER_TEMP}/certificate.p12"
          rm -f "${RUNNER_TEMP}/notarization.zip"
